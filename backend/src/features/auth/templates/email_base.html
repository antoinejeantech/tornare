<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>{% block title %}Tornare{% endblock title %}</title>
</head>
<body style="margin:0;padding:0;background:#080d17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#080d17;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- Card -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
               style="max-width:480px;background:#0f1522;border-radius:12px;
                      border:1px solid #1e2a3a;overflow:hidden;">

          <!-- Header: logo + wordmark -->
          <tr>
            <td align="center" style="background:#0a1020;padding:28px 32px;border-bottom:1px solid #1e2a3a;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:middle;padding-right:12px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 320 320" role="img" aria-label="Tornare">
                      <rect x="40" y="40" width="240" height="240" rx="42" fill="#f0bf4c"/>
                      <path d="M90 160H120L152 88L188 228L220 160H246" fill="none" stroke="#0f1522" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </td>
                  <td style="vertical-align:middle;">
                    <span style="font-size:22px;font-weight:700;letter-spacing:0.06em;color:#f0bf4c;">TORNARE</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Content: heading + child body + CTA button -->
          <tr>
            <td style="padding:36px 40px 28px;">
              <h1 style="margin:0 0 16px;font-size:20px;font-weight:700;color:#e8edf5;">
                {% block heading %}{% endblock heading %}
              </h1>

              {% block body %}{% endblock body %}

              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-radius:8px;background:#f0bf4c;">
                    <a href="{{ cta_url }}"
                       style="display:inline-block;padding:13px 32px;font-size:15px;font-weight:700;
                              color:#0f1522;text-decoration:none;border-radius:8px;
                              letter-spacing:0.02em;">{% block cta_label %}{% endblock cta_label %}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider + footer note + fallback link -->
          <tr>
            <td style="padding:0 40px 28px;">
              <hr style="border:none;border-top:1px solid #1e2a3a;margin:0 0 20px;"/>
              {% block footer_note %}{% endblock footer_note %}
              <p style="margin:8px 0 0;font-size:11px;color:#4a6080;">
                Or copy this link into your browser:<br/>
                <span style="word-break:break-all;color:#3a5070;">{{ cta_url }}</span>
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center"
                style="background:#0a1020;border-top:1px solid #1e2a3a;
                       padding:18px 32px;border-radius:0 0 12px 12px;">
              <p style="margin:0;font-size:11px;color:#3a5070;">
                &copy; Tornare &mdash; <a href="https://tornare.gg" style="color:#3a5070;text-decoration:none;">tornare.gg</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
