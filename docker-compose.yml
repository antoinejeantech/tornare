services:
  postgres:
    image: postgres:16-bookworm
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tornare
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tornare"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tornare-backend:latest
    container_name: tornare-backend
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/tornare
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-bookworm
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  rust-dev:
    image: rust:1.89-bookworm
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - rust-target:/workspace/backend/target
    command: sleep infinity

  node-dev:
    image: node:20-bookworm
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    command: sleep infinity

volumes:
  postgres-data:
  cargo-registry:
  cargo-git:
  rust-target:
