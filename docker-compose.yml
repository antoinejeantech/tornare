services:
  postgres:
    image: postgres:16-bookworm
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tornare
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tornare"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.29.7
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: tornare-backend:latest
    container_name: tornare-backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/tornare
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    profiles:
      - production
    build:
      context: .
      dockerfile: bot/Dockerfile
    image: tornare-bot:latest
    container_name: tornare-bot
    env_file:
      - ./bot/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/tornare
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-bookworm
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  rust-dev:
    image: rust:1.89-bookworm
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-bin:/usr/local/cargo/bin
      - rust-target:/workspace/backend/target
    command: sleep infinity

  backend-dev:
    image: rust:1.89-bookworm
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-bin:/usr/local/cargo/bin
      - rust-target:/workspace/backend/target
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/tornare
      - SKIP_MIGRATIONS=${SKIP_MIGRATIONS:-false}
    ports:
      - "8000:8000"
    command: sh -c "cargo install cargo-watch --locked 2>/dev/null; cargo watch -x run"
    depends_on:
      postgres:
        condition: service_healthy

  node-dev:
    image: node:20-bookworm
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    command: sleep infinity

  bot-dev:
    image: rust:1.89-bookworm
    working_dir: /workspace/bot
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-bin:/usr/local/cargo/bin
      - bot-target:/workspace/bot/target
    env_file:
      - ./bot/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/tornare
      - RUST_LOG=info
    restart: on-failure
    command: sh -c "cargo install cargo-watch --locked 2>/dev/null; cargo watch -x run"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  cargo-registry:
  cargo-git:
  cargo-bin:
  rust-target:
  bot-target:
